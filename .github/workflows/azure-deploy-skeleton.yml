name: azure-deploy-skeleton

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
  HEALTHCHECK_URL: ${{ secrets.REOS_HEALTHCHECK_URL }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests -q

  build-container:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t reos-backend:ci ./backend

  deploy-app-service:
    runs-on: ubuntu-latest
    needs: build-container
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy placeholder to Azure App Service
        run: |
          echo "Replace this command with your deploy workflow."
          echo "Target app: ${AZURE_WEBAPP_NAME}"
          echo "Target resource group: ${AZURE_RESOURCE_GROUP}"

  post-deploy-health-check:
    runs-on: ubuntu-latest
    needs: deploy-app-service
    steps:
      - name: Run health check
        run: |
          if [ -z "${HEALTHCHECK_URL}" ]; then
            echo "REOS_HEALTHCHECK_URL secret is not configured."
            exit 1
          fi
          curl --fail --silent --show-error "${HEALTHCHECK_URL}"
